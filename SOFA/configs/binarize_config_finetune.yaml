# Binarize config for the kunqu finetune. Differences vs configs/binarize_config.yaml:
# smaller valid set (tiny corpus) and a per-fold data_folder. binarize.py has no
# --data_folder flag, so scripts/finetune_kunqu.sh rewrites `data_folder` per fold
# (data/finetune_A or data/finetune_B) before calling `python binarize.py -c <this>`.
# NOTE: binarize.py writes global_config.yaml to a hardcoded data/binary/; the
# runbook copies it into <data_folder>/binary/ so train.py can find it.
melspec_config:
  n_mels: 128
  sample_rate: 44100
  win_length: 1024
  hop_length: 512
  n_fft: 2048
  fmin: 40
  fmax: 16000
  clamp: 0.00001
  scale_factor: 4

data_folder: data/finetune_A   # rewritten per fold by scripts/finetune_kunqu.sh
valid_set_size: 8
valid_set_preferred_folders:
  - test
ignored_phonemes:
  - AP
  - SP
  - <AP>
  - <SP>
  - ''
  - pau
  - cl
data_augmentation:
  size: 2 # If the data contains unlabeled data, it must be equal to or greater than 1.
  key_shift_choices: [ 1, 2, 3, 4, 5, 6,-1,-2,-3,-4,-5,-6 ]

max_length: 45 # unit: second
